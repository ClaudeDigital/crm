<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CRM — Paneli i Kompanisë</title>
<style>
:root {
  --orange-50: #fff7ed;
  --orange-100: #ffedd5;
  --orange-200: #fed7aa;
  --orange-300: #fdba74;
  --orange-400: #fb923c;
  --orange-500: #f97316;
  --orange-600: #ea580c;
  --orange-700: #c2410c;
  --orange-800: #9a3412;
  --orange-900: #7c2d12;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --green-100: #dcfce7; --green-600: #16a34a; --green-700: #15803d;
  --red-100: #fee2e2; --red-600: #dc2626;
  --blue-100: #dbeafe; --blue-600: #2563eb;
  --yellow-100: #fef9c3; --yellow-700: #a16207;
  --sidebar-w: 260px;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 10px 30px rgba(0,0,0,.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--gray-50); color: var(--gray-800); font-size: 15px; line-height: 1.5; }

/* ===== LOGIN ===== */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--orange-900) 0%, var(--orange-600) 60%, var(--orange-400) 100%);
  padding: 20px; position: relative; overflow: hidden;
}
#login-screen::before {
  content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%;
  background: rgba(255,255,255,.05); top: -200px; right: -200px; pointer-events: none;
}
#login-screen::after {
  content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%;
  background: rgba(255,255,255,.04); bottom: -150px; left: -100px; pointer-events: none;
}
.login-card {
  background: white; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px;
  box-shadow: 0 25px 50px rgba(0,0,0,.25); position: relative; z-index: 1;
}
.login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
.login-brand-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: linear-gradient(135deg, var(--orange-600), var(--orange-400));
  display: flex; align-items: center; justify-content: center; font-size: 22px;
  box-shadow: 0 4px 12px rgba(234,88,12,.35);
}
.login-brand h1 { font-size: 22px; font-weight: 800; color: var(--gray-900); letter-spacing: -.5px; }
.login-brand p { font-size: 13px; color: var(--gray-400); }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; }
.input-wrap { position: relative; }
.input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
.form-group input {
  width: 100%; padding: 12px 14px 12px 42px; border: 1.5px solid var(--gray-200);
  border-radius: 10px; font-size: 15px; color: var(--gray-800); background: var(--gray-50);
  transition: border-color .2s, box-shadow .2s, background .2s; outline: none;
}
.form-group input:focus { border-color: var(--orange-500); background: white; box-shadow: 0 0 0 3px rgba(249,115,22,.12); }
.form-group select, .form-group textarea {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray-200);
  border-radius: 10px; font-size: 14px; color: var(--gray-800); background: var(--gray-50);
  transition: border-color .2s, box-shadow .2s; outline: none; font-family: inherit;
}
.form-group select:focus, .form-group textarea:focus { border-color: var(--orange-500); background: white; box-shadow: 0 0 0 3px rgba(249,115,22,.12); }
.form-group textarea { resize: vertical; min-height: 80px; }
.btn-login {
  width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer;
  font-size: 15px; font-weight: 700; letter-spacing: .3px;
  background: linear-gradient(135deg, var(--orange-600), var(--orange-500));
  color: white; box-shadow: 0 4px 14px rgba(234,88,12,.4); transition: all .2s; margin-top: 8px;
}
.btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(234,88,12,.5); }
.btn-login:active { transform: translateY(0); }
.error-msg {
  background: var(--red-100); border-left: 3px solid var(--red-600); color: var(--red-600);
  padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none;
}

/* ===== LAYOUT ===== */
#app { display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w); background: var(--gray-900); display: flex;
  flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh;
  z-index: 200; transition: transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow: 4px 0 20px rgba(0,0,0,.15);
}
.sidebar-logo {
  padding: 24px 20px 20px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,.07);
}
.sidebar-logo-icon {
  width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--orange-600), var(--orange-400));
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.sidebar-logo h2 { font-size: 17px; font-weight: 800; color: white; letter-spacing: -.3px; }
.sidebar-logo span { font-size: 11px; color: var(--gray-400); }
.sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
.nav-section { font-size: 10px; font-weight: 700; color: var(--gray-500); letter-spacing: 1px;
  text-transform: uppercase; padding: 14px 10px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 11px; padding: 10px 12px;
  cursor: pointer; color: var(--gray-400); font-size: 14px; font-weight: 500;
  border-radius: 9px; transition: all .15s; margin-bottom: 2px; position: relative;
}
.nav-item:hover { background: rgba(255,255,255,.07); color: var(--gray-100); }
.nav-item.active { background: linear-gradient(135deg, var(--orange-700), var(--orange-600)); color: white; box-shadow: 0 2px 10px rgba(234,88,12,.35); }
.nav-item .icon { font-size: 17px; width: 20px; text-align: center; flex-shrink: 0; }
.sidebar-footer { padding: 14px 10px; border-top: 1px solid rgba(255,255,255,.07); }
.user-chip {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  background: rgba(255,255,255,.05); border-radius: 9px; margin-bottom: 8px;
}
.user-avatar {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--orange-600), var(--orange-400));
  display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white;
}
.user-chip-name { font-size: 13px; font-weight: 600; color: var(--gray-100); }
.user-chip-role { font-size: 11px; color: var(--gray-500); }
.btn-logout {
  width: 100%; padding: 9px; border-radius: 9px; border: none; cursor: pointer;
  background: rgba(255,255,255,.06); color: var(--gray-400); font-size: 13px;
  font-weight: 500; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-logout:hover { background: rgba(220,38,38,.15); color: #f87171; }

/* OVERLAY for mobile */
.sidebar-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 199;
  backdrop-filter: blur(2px);
}

/* MAIN */
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar {
  background: white; border-bottom: 1px solid var(--gray-200); padding: 0 28px;
  height: 62px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 0 var(--gray-100);
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.hamburger {
  display: none; width: 36px; height: 36px; border-radius: 9px; border: none;
  background: var(--gray-100); cursor: pointer; align-items: center; justify-content: center;
  font-size: 18px; transition: background .15s;
}
.hamburger:hover { background: var(--gray-200); }
.topbar h1 { font-size: 18px; font-weight: 800; color: var(--gray-900); letter-spacing: -.4px; }
.topbar-actions { display: flex; gap: 10px; align-items: center; }
.content { padding: 24px 28px; flex: 1; }

/* ===== BUTTONS ===== */
.btn { padding: 9px 18px; border-radius: 9px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: linear-gradient(135deg, var(--orange-600), var(--orange-500)); color: white; box-shadow: 0 2px 8px rgba(234,88,12,.3); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(234,88,12,.4); }
.btn-success { background: var(--green-600); color: white; }
.btn-danger { background: transparent; color: var(--red-600); border: 1.5px solid var(--red-100); }
.btn-danger:hover { background: var(--red-100); }
.btn-ghost { background: transparent; color: var(--gray-600); border: 1.5px solid var(--gray-200); }
.btn-ghost:hover { background: var(--gray-100); }
.btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 7px; }

/* ===== STAT CARDS ===== */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: white; border-radius: var(--radius); padding: 20px; border: 1px solid var(--gray-200);
  box-shadow: var(--shadow); position: relative; overflow: hidden; transition: transform .2s, box-shadow .2s;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.stat-card::after {
  content: ''; position: absolute; top: 0; right: 0; width: 80px; height: 80px;
  border-radius: 0 0 0 80px; opacity: .06;
}
.stat-card.orange::after { background: var(--orange-500); }
.stat-card.green::after { background: var(--green-600); }
.stat-card.blue::after { background: var(--blue-600); }
.stat-card.purple::after { background: #7c3aed; }
.stat-label { font-size: 12px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.stat-value { font-size: 32px; font-weight: 800; color: var(--gray-900); letter-spacing: -1px; line-height: 1; }
.stat-sub { font-size: 12px; color: var(--gray-400); margin-top: 6px; }
.stat-icon-bg {
  position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.stat-card.orange .stat-icon-bg { background: var(--orange-100); }
.stat-card.green .stat-icon-bg { background: var(--green-100); }
.stat-card.blue .stat-icon-bg { background: var(--blue-100); }
.stat-card.purple .stat-icon-bg { background: #ede9fe; }

/* ===== CARD ===== */
.card { background: white; border-radius: var(--radius); border: 1px solid var(--gray-200); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px; }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
.card-header h3 { font-size: 15px; font-weight: 700; color: var(--gray-900); }
.card-header-sub { font-size: 13px; color: var(--gray-400); }

/* ===== TABLE ===== */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; min-width: 600px; }
th { background: var(--gray-50); padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid var(--gray-200); white-space: nowrap; }
td { padding: 13px 16px; font-size: 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tbody tr { transition: background .1s; }
tbody tr:hover td { background: var(--orange-50); }
.td-actions { display: flex; gap: 6px; }

/* ===== BADGES ===== */
.badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.badge-green { background: var(--green-100); color: var(--green-700); }
.badge-green::before { background: var(--green-600); }
.badge-blue { background: var(--blue-100); color: var(--blue-600); }
.badge-blue::before { background: var(--blue-600); }
.badge-orange { background: var(--orange-100); color: var(--orange-700); }
.badge-orange::before { background: var(--orange-500); }
.badge-red { background: var(--red-100); color: var(--red-600); }
.badge-red::before { background: var(--red-600); }
.badge-gray { background: var(--gray-100); color: var(--gray-500); }
.badge-gray::before { background: var(--gray-400); }
.badge-purple { background: #ede9fe; color: #7c3aed; }
.badge-purple::before { background: #7c3aed; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 300;
  display: flex; align-items: flex-end; justify-content: center; padding: 0;
  backdrop-filter: blur(4px); animation: fadeIn .15s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: white; width: 100%; max-width: 540px; border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 40px rgba(0,0,0,.2); animation: slideUp .25s cubic-bezier(.4,0,.2,1);
  max-height: 92vh; overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@media (min-width: 600px) {
  .modal-overlay { align-items: center; padding: 20px; }
  .modal { border-radius: 16px; animation: scaleIn .2s cubic-bezier(.4,0,.2,1); }
  @keyframes scaleIn { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
}
.modal-handle { width: 36px; height: 4px; background: var(--gray-200); border-radius: 2px; margin: 12px auto 0; display: block; }
@media (min-width: 600px) { .modal-handle { display: none; } }
.modal-header { padding: 18px 20px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--gray-100); }
.modal-header h3 { font-size: 16px; font-weight: 800; color: var(--gray-900); }
.close-btn { width: 30px; height: 30px; border-radius: 8px; background: var(--gray-100); border: none; cursor: pointer; font-size: 16px; color: var(--gray-500); display: flex; align-items: center; justify-content: center; transition: background .15s; }
.close-btn:hover { background: var(--gray-200); }
.modal-body { padding: 20px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--gray-100); display: flex; gap: 10px; justify-content: flex-end; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

/* ===== SEARCH ===== */
.search-wrap { position: relative; }
.search-wrap input {
  padding: 9px 14px 9px 36px; border: 1.5px solid var(--gray-200); border-radius: 9px;
  font-size: 14px; width: 220px; background: var(--gray-50); outline: none; transition: all .2s;
}
.search-wrap input:focus { border-color: var(--orange-400); background: white; box-shadow: 0 0 0 3px rgba(249,115,22,.1); width: 260px; }
.search-wrap::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; pointer-events: none; }

/* ===== CHARTS ===== */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.chart-bar-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13px; }
.chart-bar-label { width: 120px; color: var(--gray-500); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.chart-bar-track { flex: 1; height: 8px; background: var(--gray-100); border-radius: 4px; overflow: hidden; }
.chart-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--orange-600), var(--orange-400)); transition: width .6s cubic-bezier(.4,0,.2,1); }
.chart-bar-val { width: 28px; text-align: right; font-weight: 700; color: var(--gray-700); font-size: 13px; }

/* ===== EMPTY STATE ===== */
.empty-state { text-align: center; padding: 56px 20px; color: var(--gray-400); }
.empty-state .empty-icon { font-size: 44px; margin-bottom: 12px; opacity: .6; }
.empty-state p { font-size: 14px; }

/* ===== FILTER TABS ===== */
.filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-tab { padding: 7px 14px; border-radius: 8px; border: 1.5px solid var(--gray-200); background: white; color: var(--gray-500); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
.filter-tab:hover { border-color: var(--orange-300); color: var(--orange-600); }
.filter-tab.active { background: var(--orange-600); color: white; border-color: var(--orange-600); box-shadow: 0 2px 8px rgba(234,88,12,.3); }

/* ===== ATTENDANCE ===== */
.month-nav { display: flex; align-items: center; gap: 16px; background: white; border: 1px solid var(--gray-200); border-radius: 10px; padding: 8px 16px; width: fit-content; margin-bottom: 20px; box-shadow: var(--shadow); }
.month-nav strong { font-size: 15px; font-weight: 700; color: var(--gray-800); min-width: 80px; text-align: center; }
.month-btn { width: 30px; height: 30px; border-radius: 7px; border: none; background: var(--gray-100); cursor: pointer; font-size: 14px; transition: background .15s; }
.month-btn:hover { background: var(--orange-100); color: var(--orange-700); }
.att-summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
.att-card { background: white; border: 1px solid var(--gray-200); border-radius: 10px; padding: 14px 16px; box-shadow: var(--shadow); }
.att-card-name { font-size: 14px; font-weight: 700; color: var(--gray-800); margin-bottom: 4px; }
.att-card-stats { display: flex; gap: 14px; font-size: 13px; color: var(--gray-500); }
.att-card-stats strong { color: var(--orange-600); }

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); width: 280px; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay { display: block; }
  .main { margin-left: 0; }
  .hamburger { display: flex; }
  .content { padding: 16px; }
  .topbar { padding: 0 16px; height: 56px; }
  .stat-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-value { font-size: 26px; }
  .chart-grid { grid-template-columns: 1fr; }
  .card-header { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
  td, th { padding: 10px 12px; }
  .search-wrap input { width: 160px; }
  .search-wrap input:focus { width: 180px; }
  .topbar-actions .btn span { display: none; }
}
@media (max-width: 420px) {
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .login-card { padding: 36px 24px; }
}

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">🏢</div>
      <div>
        <h1>CRM</h1>
        <p>Paneli i Kompanisë</p>
      </div>
    </div>
    <div class="error-msg" id="login-error"></div>
    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap">
        <span class="input-icon">📧</span>
        <input type="email" id="login-email" placeholder="email@kompania.com" autocomplete="email">
      </div>
    </div>
    <div class="form-group">
      <label>Fjalëkalimi</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>
    <button class="btn-login" onclick="doLogin()">Hyr në sistem →</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="sidebar-overlay hidden" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🏢</div>
      <div>
        <h2>CRM</h2>
        <span>Paneli i Kompanisë</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Kryesor</div>
      <div class="nav-item active" onclick="showPage('dashboard')" data-page="dashboard">
        <span class="icon">📊</span> Dashboard
      </div>
      <div class="nav-section">Menaxhim</div>
      <div class="nav-item" onclick="showPage('employees')" data-page="employees">
        <span class="icon">👥</span> Punonjësit
      </div>
      <div class="nav-item" onclick="showPage('tasks')" data-page="tasks">
        <span class="icon">✅</span> Detyrat
      </div>
      <div class="nav-item" onclick="showPage('attendance')" data-page="attendance">
        <span class="icon">🕐</span> Prezenca
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">A</div>
        <div>
          <div class="user-chip-name" id="sidebar-username">—</div>
          <div class="user-chip-role">Administrator</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">⏻ Dil nga sistemi</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h1 id="page-title">Dashboard</h1>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="page-content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3 id="modal-title">—</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('crm_token');
let currentUser = JSON.parse(localStorage.getItem('crm_user') || 'null');

// --- AUTH ---
async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const btn = document.querySelector('.btn-login');
  errEl.style.display = 'none';
  btn.textContent = 'Duke hyrë...'; btn.disabled = true;
  try {
    const r = await api('/api/login', 'POST', { email, password: pass });
    token = r.token; currentUser = r.user;
    localStorage.setItem('crm_token', token);
    localStorage.setItem('crm_user', JSON.stringify(currentUser));
    initApp();
  } catch(e) {
    errEl.textContent = e.message || 'Gabim gjatë hyrjes';
    errEl.style.display = 'block';
    btn.textContent = 'Hyr në sistem →'; btn.disabled = false;
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('login-screen').classList.contains('hidden')) doLogin();
});
function initApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  const name = currentUser?.name || 'A';
  document.getElementById('sidebar-username').textContent = name;
  document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
  showPage('dashboard');
}
function logout() {
  token = null; currentUser = null;
  localStorage.removeItem('crm_token'); localStorage.removeItem('crm_user');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}
if (token && currentUser) initApp();

// --- SIDEBAR MOBILE ---
function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('sidebar-overlay');
  s.classList.toggle('open');
  o.classList.toggle('hidden', !s.classList.contains('open'));
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.add('hidden');
}

// --- API ---
async function api(url, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + url, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Gabim');
  return data;
}

// --- PAGES ---
function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  const titles = { dashboard: 'Dashboard', employees: 'Punonjësit', tasks: 'Detyrat', attendance: 'Prezenca & Orët' };
  document.getElementById('page-title').textContent = titles[page];
  document.getElementById('topbar-actions').innerHTML = '';
  closeSidebar();
  if (page === 'dashboard') renderDashboard();
  else if (page === 'employees') renderEmployees();
  else if (page === 'tasks') renderTasks();
  else if (page === 'attendance') renderAttendance();
}

// --- DASHBOARD ---
async function renderDashboard() {
  const c = document.getElementById('page-content');
  c.innerHTML = '<div style="text-align:center;padding:60px;color:var(--gray-400)">Duke ngarkuar...</div>';
  const d = await api('/api/dashboard');
  c.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card orange">
        <div class="stat-icon-bg">👥</div>
        <div class="stat-label">Punonjës Aktivë</div>
        <div class="stat-value">${d.total_employees}</div>
        <div class="stat-sub">gjithsej aktiv</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon-bg">✅</div>
        <div class="stat-label">Detyra</div>
        <div class="stat-value">${d.total_tasks}</div>
        <div class="stat-sub">${d.tasks_done} të përfunduara</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-icon-bg">🟢</div>
        <div class="stat-label">Prezentë Sot</div>
        <div class="stat-value">${d.present_today}</div>
        <div class="stat-sub">nga ${d.total_employees} punonjës</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-icon-bg">⏱️</div>
        <div class="stat-label">Orë Mesatare</div>
        <div class="stat-value">${d.avg_hours}</div>
        <div class="stat-sub">orë / muaj</div>
      </div>
    </div>
    <div class="chart-grid">
      <div class="card">
        <div class="card-header"><h3>Punonjës sipas Departamentit</h3></div>
        <div style="padding:20px">
          <div id="dept-chart"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3>Statusi i Detyrave</h3></div>
        <div style="padding:20px">
          ${taskBar('Në Pritje', d.tasks_pending, d.total_tasks, 'var(--orange-500)')}
          ${taskBar('Në Progres', d.tasks_progress, d.total_tasks, 'var(--blue-600)')}
          ${taskBar('Përfunduar', d.tasks_done, d.total_tasks, 'var(--green-600)')}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <h3>Detyrat e Fundit</h3>
        <span class="card-header-sub">5 të fundit</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Titulli</th><th>Punonjësi</th><th>Prioriteti</th><th>Statusi</th></tr></thead>
          <tbody>
            ${d.recent_tasks.map(t => `<tr>
              <td><span style="font-weight:600">${t.title}</span></td>
              <td>${t.employee_name || '—'}</td>
              <td>${priorityBadge(t.priority)}</td>
              <td>${statusBadge(t.status)}</td>
            </tr>`).join('') || `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">📋</div><p>Nuk ka detyra</p></div></td></tr>`}
          </tbody>
        </table>
      </div>
    </div>`;
  const maxD = Math.max(...d.by_dept.map(x => x.count), 1);
  document.getElementById('dept-chart').innerHTML = d.by_dept.length
    ? d.by_dept.map(x => `<div class="chart-bar-item">
        <div class="chart-bar-label">${x.department}</div>
        <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${(x.count/maxD*100).toFixed(0)}%"></div></div>
        <div class="chart-bar-val">${x.count}</div>
      </div>`).join('')
    : '<p style="color:var(--gray-400);font-size:13px">Nuk ka të dhëna</p>';
}
function taskBar(label, val, total, color) {
  const pct = total > 0 ? (val/total*100).toFixed(0) : 0;
  return `<div class="chart-bar-item">
    <div class="chart-bar-label">${label}</div>
    <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="chart-bar-val">${val}</div>
  </div>`;
}

// --- EMPLOYEES ---
let employees = [];
async function renderEmployees() {
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="openEmployeeModal()"><span>+</span><span> Shto</span></button>`;
  employees = await api('/api/employees');
  renderEmployeeTable(employees);
}
function renderEmployeeTable(list) {
  const c = document.getElementById('page-content');
  c.innerHTML = `
    <div class="card">
      <div class="card-header">
        <h3>Punonjësit <span style="font-weight:400;color:var(--gray-400)">(${list.length})</span></h3>
        <div class="search-wrap"><input placeholder="Kërko..." oninput="filterEmployees(this.value)"></div>
      </div>
      <div class="table-wrap">
        ${list.length === 0
          ? `<div class="empty-state"><div class="empty-icon">👥</div><p>Nuk ka punonjës. Shto të parën!</p></div>`
          : `<table>
              <thead><tr><th>Punonjësi</th><th>Departamenti</th><th>Kontakti</th><th>Statusi</th><th></th></tr></thead>
              <tbody>
                ${list.map(e => `<tr>
                  <td>
                    <div style="font-weight:700;color:var(--gray-900)">${e.name}</div>
                    <div style="font-size:12px;color:var(--gray-400)">${e.role}</div>
                  </td>
                  <td><span class="badge badge-orange">${e.department}</span></td>
                  <td>
                    <div style="font-size:13px">${e.email || '—'}</div>
                    <div style="font-size:12px;color:var(--gray-400)">${e.phone || ''}</div>
                  </td>
                  <td>${e.status === 'aktiv' ? '<span class="badge badge-green">Aktiv</span>' : '<span class="badge badge-gray">Joaktiv</span>'}</td>
                  <td>
                    <div class="td-actions">
                      <button class="btn btn-ghost btn-sm" onclick="openEmployeeModal(${e.id})">Ndrysho</button>
                      <button class="btn btn-danger btn-sm" onclick="deleteEmployee(${e.id},'${e.name}')">Fshi</button>
                    </div>
                  </td>
                </tr>`).join('')}
              </tbody>
            </table>`}
      </div>
    </div>`;
}
function filterEmployees(q) {
  const f = employees.filter(e =>
    e.name.toLowerCase().includes(q.toLowerCase()) ||
    e.role.toLowerCase().includes(q.toLowerCase()) ||
    e.department.toLowerCase().includes(q.toLowerCase())
  );
  renderEmployeeTable(f);
}
function openEmployeeModal(id) {
  const e = id ? employees.find(x => x.id === id) : null;
  showModal(e ? 'Ndrysho Punonjësin' : 'Shto Punonjës Të Ri', `
    <div class="form-row">
      <div class="form-group"><label>Emri *</label><input id="e-name" value="${e?.name||''}" placeholder="Emri Mbiemri"></div>
      <div class="form-group"><label>Roli *</label><input id="e-role" value="${e?.role||''}" placeholder="p.sh. Zhvillues"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Departamenti</label>
        <select id="e-dept">${['IT','HR','Financë','Marketing','Shitje','Operacione','Drejtim','Tjetër'].map(d=>`<option${e?.department===d?' selected':''}>${d}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>Email</label><input type="email" id="e-email" value="${e?.email||''}" placeholder="email@shembull.com"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Telefon</label><input id="e-phone" value="${e?.phone||''}" placeholder="04X XXX XXX"></div>
      <div class="form-group"><label>Statusi</label>
        <select id="e-status"><option value="aktiv"${e?.status==='aktiv'?' selected':''}>Aktiv</option><option value="joaktiv"${e?.status==='joaktiv'?' selected':''}>Joaktiv</option></select>
      </div>
    </div>`,
    async () => {
      const data = { name: v('e-name'), role: v('e-role'), department: v('e-dept'), email: v('e-email'), phone: v('e-phone'), status: v('e-status') };
      if (!data.name || !data.role) return alert('Emri dhe Roli janë të detyrueshëm');
      if (id) await api('/api/employees/'+id, 'PUT', data);
      else await api('/api/employees', 'POST', data);
      closeModal(); renderEmployees();
    });
}
async function deleteEmployee(id, name) {
  if (!confirm(`Fshi punonjësin "${name}"?`)) return;
  await api('/api/employees/'+id, 'DELETE');
  renderEmployees();
}

// --- TASKS ---
let tasks = [];
let taskFilter = 'të gjitha', taskSearch = '';
async function renderTasks() {
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="openTaskModal()"><span>+</span><span> Shto</span></button>`;
  [tasks, employees] = await Promise.all([api('/api/tasks'), api('/api/employees')]);
  renderTaskTable(tasks);
}
function renderTaskTable(list) {
  const c = document.getElementById('page-content');
  c.innerHTML = `
    <div class="filter-tabs">
      ${['të gjitha','në pritje','në progres','përfunduar'].map(s =>
        `<button class="filter-tab${taskFilter===s?' active':''}" onclick="filterTasks('${s}')">${s.charAt(0).toUpperCase()+s.slice(1)}</button>`
      ).join('')}
      <div class="search-wrap" style="margin-left:auto"><input placeholder="Kërko detyrë..." oninput="searchTasks(this.value)" value="${taskSearch}"></div>
    </div>
    <div class="card">
      <div class="table-wrap">
        ${list.length === 0
          ? `<div class="empty-state"><div class="empty-icon">✅</div><p>Nuk ka detyra në këtë kategori.</p></div>`
          : `<table>
              <thead><tr><th>Detyra</th><th>Punonjësi</th><th>Prioriteti</th><th>Statusi</th><th>Afati</th><th></th></tr></thead>
              <tbody>
                ${list.map(t => `<tr>
                  <td>
                    <div style="font-weight:700;color:var(--gray-900)">${t.title}</div>
                    ${t.description ? `<div style="font-size:12px;color:var(--gray-400);margin-top:2px">${t.description}</div>` : ''}
                  </td>
                  <td>${t.employee_name ? `<span style="font-size:13px">${t.employee_name}</span>` : '<span style="color:var(--gray-300)">—</span>'}</td>
                  <td>${priorityBadge(t.priority)}</td>
                  <td>${statusBadge(t.status)}</td>
                  <td><span style="font-size:13px;color:var(--gray-500)">${t.due_date || '—'}</span></td>
                  <td>
                    <div class="td-actions">
                      <button class="btn btn-ghost btn-sm" onclick="openTaskModal(${t.id})">Ndrysho</button>
                      <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">Fshi</button>
                    </div>
                  </td>
                </tr>`).join('')}
              </tbody>
            </table>`}
      </div>
    </div>`;
}
function filterTasks(s) { taskFilter = s; applyTaskFilters(); }
function searchTasks(q) { taskSearch = q; applyTaskFilters(); }
function applyTaskFilters() {
  let list = tasks;
  if (taskFilter !== 'të gjitha') list = list.filter(t => t.status === taskFilter);
  if (taskSearch) list = list.filter(t => t.title.toLowerCase().includes(taskSearch.toLowerCase()));
  renderTaskTable(list);
}
function openTaskModal(id) {
  const t = id ? tasks.find(x => x.id === id) : null;
  const empOpts = employees.map(e => `<option value="${e.id}"${t?.assigned_to===e.id?' selected':''}>${e.name}</option>`).join('');
  showModal(t ? 'Ndrysho Detyrën' : 'Shto Detyrë Të Re', `
    <div class="form-group"><label>Titulli *</label><input id="t-title" value="${t?.title||''}" placeholder="Titulli i detyrës"></div>
    <div class="form-group"><label>Përshkrimi</label><textarea id="t-desc" placeholder="Përshkrim opsional...">${t?.description||''}</textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Cakto Punonjësit</label>
        <select id="t-emp"><option value="">— Zgjidh —</option>${empOpts}</select>
      </div>
      <div class="form-group"><label>Prioriteti</label>
        <select id="t-priority">${['e ulët','normale','e lartë','urgjente'].map(p=>`<option${t?.priority===p?' selected':''}>${p}</option>`).join('')}</select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Statusi</label>
        <select id="t-status">${['në pritje','në progres','përfunduar'].map(s=>`<option${t?.status===s?' selected':''}>${s}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>Afati</label><input type="date" id="t-due" value="${t?.due_date||''}"></div>
    </div>`,
    async () => {
      const data = { title: v('t-title'), description: v('t-desc'), assigned_to: v('t-emp')||null, priority: v('t-priority'), status: v('t-status'), due_date: v('t-due') };
      if (!data.title) return alert('Titulli është i detyrueshëm');
      if (id) await api('/api/tasks/'+id, 'PUT', data);
      else await api('/api/tasks', 'POST', data);
      closeModal(); renderTasks();
    });
}
async function deleteTask(id) {
  if (!confirm('Fshi detyrën?')) return;
  await api('/api/tasks/'+id, 'DELETE');
  renderTasks();
}

// --- ATTENDANCE ---
let attMonth = new Date().toISOString().slice(0,7);
async function renderAttendance() {
  employees = await api('/api/employees');
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="openAttModal()"><span>+</span><span> Regjistro</span></button>`;
  loadAttendance();
}
async function loadAttendance() {
  const data = await api(`/api/attendance?month=${attMonth}`);
  const c = document.getElementById('page-content');
  const empMap = {};
  data.forEach(a => {
    if (!empMap[a.employee_name]) empMap[a.employee_name] = { days: 0, hours: 0 };
    empMap[a.employee_name].days++;
    empMap[a.employee_name].hours += a.hours_worked || 0;
  });
  const [y, m] = attMonth.split('-');
  const monthNames = ['Janar','Shkurt','Mars','Prill','Maj','Qershor','Korrik','Gusht','Shtator','Tetor','Nëntor','Dhjetor'];
  c.innerHTML = `
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">◀</button>
      <strong>${monthNames[parseInt(m)-1]} ${y}</strong>
      <button class="month-btn" onclick="changeMonth(1)">▶</button>
    </div>
    ${Object.keys(empMap).length > 0 ? `
    <div class="att-summary-grid">
      ${Object.entries(empMap).map(([name, s]) => `
        <div class="att-card">
          <div class="att-card-name">${name}</div>
          <div class="att-card-stats">
            <span><strong>${s.days}</strong> ditë</span>
            <span><strong>${s.hours.toFixed(1)}h</strong> totale</span>
          </div>
        </div>`).join('')}
    </div>` : ''}
    <div class="card">
      <div class="card-header">
        <h3>Regjistrimet</h3>
        <span class="card-header-sub">${data.length} regjistrime</span>
      </div>
      <div class="table-wrap">
        ${data.length === 0
          ? `<div class="empty-state"><div class="empty-icon">🕐</div><p>Nuk ka regjistrime për këtë muaj.</p></div>`
          : `<table>
              <thead><tr><th>Data</th><th>Punonjësi</th><th>Hyrja</th><th>Dalja</th><th>Orë</th><th></th></tr></thead>
              <tbody>
                ${data.map(a => `<tr>
                  <td><span style="font-weight:700;color:var(--orange-600)">${a.date}</span></td>
                  <td>${a.employee_name}</td>
                  <td>${a.check_in||'—'}</td>
                  <td>${a.check_out||'—'}</td>
                  <td>${a.hours_worked!=null?`<span style="font-weight:600">${a.hours_worked.toFixed(1)}h</span>`:'—'}</td>
                  <td><button class="btn btn-danger btn-sm" onclick="deleteAtt(${a.id})">✕</button></td>
                </tr>`).join('')}
              </tbody>
            </table>`}
      </div>
    </div>`;
}
function changeMonth(d) {
  const [y,m] = attMonth.split('-').map(Number);
  const dt = new Date(y, m-1+d, 1);
  attMonth = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
  loadAttendance();
}
function openAttModal() {
  const today = new Date().toISOString().split('T')[0];
  const empOpts = employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
  showModal('Regjistro Prezencë', `
    <div class="form-row">
      <div class="form-group"><label>Punonjësi *</label>
        <select id="a-emp"><option value="">— Zgjidh —</option>${empOpts}</select>
      </div>
      <div class="form-group"><label>Data *</label><input type="date" id="a-date" value="${today}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Ora e Hyrjes</label><input type="time" id="a-in" value="08:00"></div>
      <div class="form-group"><label>Ora e Daljes</label><input type="time" id="a-out" value="17:00"></div>
    </div>
    <div class="form-group"><label>Shënime</label><input id="a-notes" placeholder="Opsionale..."></div>`,
    async () => {
      const data = { employee_id: v('a-emp'), date: v('a-date'), check_in: v('a-in'), check_out: v('a-out'), notes: v('a-notes') };
      if (!data.employee_id || !data.date) return alert('Punonjësi dhe data janë të detyrueshme');
      await api('/api/attendance', 'POST', data);
      closeModal(); loadAttendance();
    });
}
async function deleteAtt(id) {
  if (!confirm('Fshi regjistrimin?')) return;
  await api('/api/attendance/'+id, 'DELETE');
  loadAttendance();
}

// --- HELPERS ---
function v(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function priorityBadge(p) {
  const map = { 'e ulët':'badge-gray','normale':'badge-blue','e lartë':'badge-orange','urgjente':'badge-red' };
  return `<span class="badge ${map[p]||'badge-gray'}">${p||'normale'}</span>`;
}
function statusBadge(s) {
  const map = { 'në pritje':'badge-orange','në progres':'badge-blue','përfunduar':'badge-green' };
  return `<span class="badge ${map[s]||'badge-gray'}">${s||'—'}</span>`;
}
function showModal(title, body, onSave) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Anulo</button>
    <button class="btn btn-primary" id="modal-save-btn">Ruaj ndryshimet</button>`;
  document.getElementById('modal-save-btn').onclick = onSave;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.add('hidden');
}
</script>
</body>
</html>
